[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Force PlatformIO to target your exact Windows COM port
upload_port = COM3
monitor_port = COM3

; Automatically download the required Adafruit screen dependencies
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    Wire